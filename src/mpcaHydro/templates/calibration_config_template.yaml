# HSPF Calibration Configuration Template
# ========================================
# This template defines calibration locations, stations, and metrics for HSPF models.
# Users can customize this file and load it using calibration_config.load_config()

# Configuration version
version: "1.0"

# Repository/Model name
repository_name: "Clearwater"

# Default metrics applied to all constituents unless overridden
default_metrics:
  - name: "NSE"
    target: 0.5
    weight: 1.0
    enabled: true
  - name: "logNSE"
    target: 0.5
    weight: 1.0
    enabled: true
  - name: "Pbias"
    target: 10.0
    weight: 1.0
    enabled: true
  - name: "monthly_average"
    target: 15.0
    weight: 0.5
    enabled: true
  - name: "annual_average"
    target: 15.0
    weight: 0.5
    enabled: true

# General constraints - scaffolding for model-level constraints (to be defined)
general_constraints: []

# Calibration locations
# A location can have multiple stations grouped together
locations:
  - location_id: 1
    location_name: "Clearwater Outlet"
    repository_name: "Clearwater"
    # Reach mappings are at the location level - shared by all stations
    reach_ids: [650]
    upstream_reach_ids: [649, 648]
    # Flow station IDs for load calculations (at location level)
    flow_station_ids: ["E66050001"]
    notes: "Main outlet combining flow and water quality stations"
    
    # Stations at this location
    stations:
      # Flow monitoring station (timeseries data)
      - station_id: "E66050001"
        station_origin: "wiski"
        repository_name: "Clearwater"
        true_reach_id: 650
        comments: "Primary USGS flow monitoring station"
        
        # Observations now include constituent config (metrics, derived_from)
        observations:
          - constituent: "Q"  # Flow
            start_year: 2000
            end_year: 2023
            avg_samples_per_year: 365.0
            median_samples_per_year: 365.0
            years_with_data: 24
            total_samples: 8760
            derived_from: []
            metrics:
              - name: "NSE"
                target: 0.5
                weight: 1.0
                enabled: true
              - name: "logNSE"
                target: 0.5
                weight: 1.0
                enabled: true
              - name: "Pbias"
                target: 10.0
                weight: 1.0
                enabled: true
      
      # Water quality monitoring station (discrete samples)
      - station_id: "S002-118"
        station_origin: "equis"
        repository_name: "Clearwater"
        true_reach_id: 650
        comments: "MPCA water quality monitoring station"
        
        observations:
          - constituent: "TSS"  # Total Suspended Solids
            start_year: 2005
            end_year: 2020
            avg_samples_per_year: 12.0
            median_samples_per_year: 10.0
            years_with_data: 15
            total_samples: 180
            derived_from: []
            metrics:
              - name: "Pbias"
                target: 25.0
                weight: 1.0
                enabled: true
          
          - constituent: "TP"  # Total Phosphorus
            start_year: 2005
            end_year: 2020
            avg_samples_per_year: 12.0
            median_samples_per_year: 10.0
            years_with_data: 15
            total_samples: 180
            derived_from: []
            metrics:
              - name: "Pbias"
                target: 25.0
                weight: 1.0
                enabled: true
          
          - constituent: "TP_load"  # Derived: load from concentration and flow
            derived_from: ["TP", "Q"]
            metrics:
              - name: "Pbias"
                target: 30.0
                weight: 1.0
                enabled: true
    
    # Watershed loading rate constraints
    watershed_constraints:
      - constituent: "TP"
        target_rate: 0.5  # lbs/acre/year
        min_rate: 0.2
        max_rate: 1.0
        landcover_constraints:
          - landcover_type: "forest"
            constituent: "TP"
            target_rate: 0.1
            min_rate: 0.05
            max_rate: 0.2
          - landcover_type: "agricultural"
            constituent: "TP"
            target_rate: 0.8
            min_rate: 0.4
            max_rate: 1.5
