# HSPF Calibration Configuration Template (TOML format)
# =====================================================

version = "1.0"
repository_name = "Clearwater"

# Default metrics
[[default_metrics]]
name = "NSE"
target = 0.5
weight = 1.0
enabled = true

[[default_metrics]]
name = "logNSE"
target = 0.5
weight = 1.0
enabled = true

[[default_metrics]]
name = "Pbias"
target = 10.0
weight = 1.0
enabled = true

# General constraints - placeholder for future use
general_constraints = []

# Calibration locations
[[locations]]
location_id = 1
location_name = "Clearwater Outlet"
repository_name = "Clearwater"
reach_ids = [650]
upstream_reach_ids = [649, 648]
flow_station_ids = ["E66050001"]
notes = "Main outlet combining flow and water quality stations"

# Station 1: Flow monitoring
[[locations.stations]]
station_id = "E66050001"
station_origin = "wiski"
repository_name = "Clearwater"
true_reach_id = 650
comments = "Primary USGS flow monitoring station"

[[locations.stations.observations]]
constituent = "Q"
start_year = 2000
end_year = 2023
avg_samples_per_year = 365.0
years_with_data = 24
total_samples = 8760
derived_from = []

[[locations.stations.observations.metrics]]
name = "NSE"
target = 0.5
weight = 1.0
enabled = true

[[locations.stations.observations.metrics]]
name = "Pbias"
target = 10.0
weight = 1.0
enabled = true

# Station 2: Water quality monitoring
[[locations.stations]]
station_id = "S002-118"
station_origin = "equis"
repository_name = "Clearwater"
true_reach_id = 650
comments = "MPCA water quality monitoring station"

[[locations.stations.observations]]
constituent = "TP"
start_year = 2005
end_year = 2020
avg_samples_per_year = 12.0
years_with_data = 15
total_samples = 180
derived_from = []

[[locations.stations.observations.metrics]]
name = "Pbias"
target = 25.0
weight = 1.0
enabled = true

# Watershed constraints
[[locations.watershed_constraints]]
constituent = "TP"
target_rate = 0.5
min_rate = 0.2
max_rate = 1.0

[[locations.watershed_constraints.landcover_constraints]]
landcover_type = "forest"
constituent = "TP"
target_rate = 0.1
min_rate = 0.05
max_rate = 0.2

[[locations.watershed_constraints.landcover_constraints]]
landcover_type = "agricultural"
constituent = "TP"
target_rate = 0.8
min_rate = 0.4
max_rate = 1.5
